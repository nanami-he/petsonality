name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Lint statusline bash syntax
        run: bash -n statusline/pet-status.sh

      - name: Verify version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          echo "package.json:   $PKG_VERSION"
          echo "plugin.json:    $PLUGIN_VERSION"
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Version mismatch between package.json ($PKG_VERSION) and .claude-plugin/plugin.json ($PLUGIN_VERSION)"
            exit 1
          fi
